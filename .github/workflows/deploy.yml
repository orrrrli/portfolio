name: Deploy Portfolio

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-portfolio
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GH_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker image
        run: |
          docker build \
            -t ghcr.io/${{ github.repository_owner }}/portfolio:latest \
            -t ghcr.io/${{ github.repository_owner }}/portfolio:${{ github.sha }} \
            .

      - name: Push Docker image to GHCR
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/portfolio:latest
          docker push ghcr.io/${{ github.repository_owner }}/portfolio:${{ github.sha }}

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            echo "${{ secrets.GH_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            cd /home/rokev-dynamics/portfolio
            git pull https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/${{ github.repository }}.git main
            docker compose pull
            docker compose up -d
            docker logout ghcr.io
            docker image prune -f

      - name: Verify deployment
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            docker inspect --format='{{.State.Health.Status}}' portfolio
